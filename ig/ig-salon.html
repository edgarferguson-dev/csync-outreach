<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG — Salon & Barber</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .post {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
      flex-shrink: 0;
    }
    .bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) contrast(1.1) brightness(0.45);
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(0,0,0,0.15) 0%,
        rgba(0,0,0,0.5) 50%,
        rgba(0,0,0,0.92) 100%
      );
    }
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 64px 72px;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .brand {
      font-size: 22px;
      font-weight: 900;
      color: #c9a84c;
      letter-spacing: -0.01em;
    }
    .badge {
      background: #c9a84c;
      color: #0a0a0a;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 40px;
    }
    .middle {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .kicker {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 88px;
      font-weight: 900;
      line-height: 0.96;
      letter-spacing: -0.04em;
      color: #ffffff;
      margin-bottom: 32px;
    }
    h1 em {
      font-style: normal;
      color: #c9a84c;
    }
    .sub {
      font-size: 22px;
      line-height: 1.55;
      color: #aaaaaa;
      max-width: 580px;
      font-weight: 400;
    }
    .bottom {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }
    .stats {
      display: flex;
      gap: 40px;
    }
    .stat .num {
      font-size: 42px;
      font-weight: 900;
      color: #c9a84c;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .stat .lbl {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666666;
      margin-top: 4px;
    }
    .cta-block {
      text-align: right;
    }
    .cta-url {
      display: block;
      font-size: 16px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .cta-phone {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #c9a84c;
      letter-spacing: 0.06em;
    }
    .gold-bar {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 5px;
      background: #c9a84c;
    }
  </style>
</head>
<body>
  <div class="post">
    <img class="bg-img" src="../assets/images/salon-action.jpg" alt="" />
    <div class="overlay"></div>
    <div class="content">
      <div class="top">
        <div class="brand">CSync Solutions</div>
        <div class="badge">AI Receptionist</div>
      </div>
      <div class="middle">
        <div class="kicker">For Salons & Barbershops</div>
        <h1>Stop losing<br/>bookings<br/>after <em>hours.</em></h1>
        <div class="sub">Your AI receptionist answers every call, books every appointment — while you focus on your clients.</div>
      </div>
      <div class="bottom">
        <div class="stats">
          <div class="stat">
            <div class="num">78%</div>
            <div class="lbl">Won't call back<br/>if no answer</div>
          </div>
          <div class="stat">
            <div class="num">24/7</div>
            <div class="lbl">Always<br/>available</div>
          </div>
          <div class="stat">
            <div class="num">&lt;2s</div>
            <div class="lbl">Response<br/>time</div>
          </div>
        </div>
        <div class="cta-block">
          <span class="cta-url">halosalondemo.com</span>
          <span class="cta-phone">929-295-5738</span>
        </div>
      </div>
    </div>
    <div class="gold-bar"></div>
  </div>
</body>
</html>
