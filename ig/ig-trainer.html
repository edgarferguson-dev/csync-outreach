<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG — Personal Trainer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .post {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
      flex-shrink: 0;
    }
    /* Split layout — left dark panel, right image */
    .left-panel {
      position: absolute;
      top: 0; left: 0;
      width: 54%;
      height: 100%;
      background: #0a0a0a;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 64px 56px 64px 72px;
    }
    .right-img {
      position: absolute;
      top: 0; right: 0;
      width: 50%;
      height: 100%;
    }
    .right-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%) contrast(1.12) brightness(0.8);
    }
    .right-img::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #0a0a0a 0%, transparent 40%);
      z-index: 1;
    }
    .brand {
      font-size: 20px;
      font-weight: 900;
      color: #c9a84c;
      letter-spacing: -0.01em;
    }
    .middle { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .kicker {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 22px;
    }
    h1 {
      font-size: 82px;
      font-weight: 900;
      line-height: 0.94;
      letter-spacing: -0.04em;
      color: #ffffff;
      margin-bottom: 28px;
    }
    h1 em {
      font-style: normal;
      color: #c9a84c;
      display: block;
    }
    .sub {
      font-size: 18px;
      line-height: 1.6;
      color: #888888;
      max-width: 38ch;
    }
    .bottom {}
    .divider {
      width: 48px;
      height: 3px;
      background: #c9a84c;
      margin-bottom: 24px;
    }
    .stats {
      display: flex;
      gap: 32px;
      margin-bottom: 28px;
    }
    .stat .num {
      font-size: 36px;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .stat .lbl {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555555;
      margin-top: 4px;
    }
    .cta-line {
      font-size: 14px;
      font-weight: 700;
      color: #c9a84c;
      letter-spacing: 0.06em;
    }
    .gold-bar {
      position: absolute;
      right: 0;
      top: 0;
      width: 5px;
      height: 100%;
      background: #c9a84c;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div class="post">
    <div class="right-img">
      <img src="../assets/images/trainer/trainer-hero.jpg" alt="" />
    </div>
    <div class="left-panel">
      <div class="brand">CSync Solutions</div>
      <div class="middle">
        <div class="kicker">For Personal Trainers</div>
        <h1>Train.<br/>Don't<br/><em>miss calls.</em></h1>
        <div class="sub">Your AI receptionist handles every inquiry while you're with clients. Book more. Hustle less.</div>
      </div>
      <div class="bottom">
        <div class="divider"></div>
        <div class="stats">
          <div class="stat">
            <div class="num">3×</div>
            <div class="lbl">More leads<br/>captured</div>
          </div>
          <div class="stat">
            <div class="num">24/7</div>
            <div class="lbl">Always<br/>answering</div>
          </div>
          <div class="stat">
            <div class="num">$0</div>
            <div class="lbl">Cost per<br/>AI call</div>
          </div>
        </div>
        <div class="cta-line">halosalondemo.com &nbsp;|&nbsp; 929-295-5738</div>
      </div>
    </div>
    <div class="gold-bar"></div>
  </div>
</body>
</html>
